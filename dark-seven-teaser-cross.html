<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DARK SEVEN — the cross</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;touch-action:none;}
  #c{display:block;width:100vw;height:100vh;background:#000;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const cv=document.getElementById('c'), ctx=cv.getContext('2d',{alpha:false});
  const cross=document.createElement('canvas'), xctx=cross.getContext('2d');   // static 3D cross
  const blood=document.createElement('canvas'), bctx=blood.getContext('2d');   // fading blood trails
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;

  let W,H,DPR,S,cx,cyY,th,vTop,vBot,hL,hR,R,band;
  const routes={};

  function rr(g,x,y,w,h,r){ g.beginPath();
    g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
    g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }
  function line(a,b,n){ const p=[]; for(let i=0;i<=n;i++){const t=i/n;
    p.push([a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t]);} return p; }
  function arc(ccx,ccy,r,a0,a1,n){ const p=[]; for(let i=0;i<=n;i++){const t=i/n,a=a0+(a1-a0)*t;
    p.push([ccx+r*Math.cos(a), ccy+r*Math.sin(a)]);} return p; }

  function build(){
    DPR=Math.min(devicePixelRatio||1,2); W=innerWidth; H=innerHeight;
    for(const c of [cv,cross,blood]){ c.width=Math.floor(W*DPR); c.height=Math.floor(H*DPR); }
    ctx.setTransform(DPR,0,0,DPR,0,0); xctx.setTransform(DPR,0,0,DPR,0,0); bctx.setTransform(DPR,0,0,DPR,0,0);
    S=Math.min(W,H); cx=W/2; cyY=H*0.47; th=S*0.105;
    vTop=cyY-S*0.34; vBot=cyY+S*0.40; hL=cx-S*0.24; hR=cx+S*0.24; R=S*0.185; band=th*0.62;

    // flow centerlines
    const top=line([cx,vTop],[cx,cyY-R],36);
    const lower=line([cx,cyY+R],[cx,vBot],44);
    const larc=arc(cx,cyY,R,-Math.PI/2,-Math.PI/2-Math.PI,40); // top→left→bottom
    const rarc=arc(cx,cyY,R,-Math.PI/2,-Math.PI/2+Math.PI,40); // top→right→bottom
    routes.L = top.concat(larc, lower);
    routes.R = top.concat(rarc, lower);
    routes.LA = line([cx,vTop],[cx,cyY],22).concat(line([cx,cyY],[hL,cyY],26));
    routes.RA = line([cx,vTop],[cx,cyY],22).concat(line([cx,cyY],[hR,cyY],26));

    drawCross();
    bctx.clearRect(0,0,W,H);
  }

  function shade(g,x0,y0,x1,y1){ const grd=g.createLinearGradient(x0,y0,x1,y1);
    grd.addColorStop(0,'#4a4a4a'); grd.addColorStop(0.5,'#2b2b2b'); grd.addColorStop(1,'#0d0d0d'); return grd; }

  function drawCross(){
    xctx.clearRect(0,0,W,H);
    // soft cast shadow (lifts the cross off the black -> 3D)
    xctx.save();
    xctx.shadowColor='rgba(0,0,0,0.9)'; xctx.shadowBlur=S*0.05; xctx.shadowOffsetX=S*0.012; xctx.shadowOffsetY=S*0.02;
    xctx.fillStyle='#151515';
    xctx.beginPath(); xctx.arc(cx,cyY,R+band/2,0,7); xctx.fill();
    rr(xctx, cx-th/2, vTop, th, vBot-vTop, th*0.35); xctx.fill();
    rr(xctx, hL, cyY-th/2, hR-hL, th, th*0.35); xctx.fill();
    xctx.restore();

    // RING (annulus) with form shading
    xctx.save();
    xctx.beginPath(); xctx.arc(cx,cyY,R+band/2,0,7);
    xctx.fillStyle=shade(xctx, cx-R, cyY-R, cx+R, cyY+R); xctx.fill();
    xctx.globalCompositeOperation='destination-out';
    xctx.beginPath(); xctx.arc(cx,cyY,R-band/2,0,7); xctx.fill();
    xctx.restore();

    // BARS on top (creates the four open quadrants inside the ring)
    xctx.fillStyle=shade(xctx, cx-th, vTop, cx+th, vBot);
    rr(xctx, cx-th/2, vTop, th, vBot-vTop, th*0.35); xctx.fill();
    xctx.fillStyle=shade(xctx, hL, cyY-th, hR, cyY+th);
    rr(xctx, hL, cyY-th/2, hR-hL, th, th*0.35); xctx.fill();

    // bevel: white grace-edge up-left, black shadow-edge down-right
    const edge=(dx,dy,style,wd)=>{ xctx.save(); xctx.translate(dx,dy);
      xctx.strokeStyle=style; xctx.lineWidth=wd; xctx.lineJoin='round';
      rr(xctx, cx-th/2, vTop, th, vBot-vTop, th*0.35); xctx.stroke();
      rr(xctx, hL, cyY-th/2, hR-hL, th, th*0.35); xctx.stroke();
      xctx.beginPath(); xctx.arc(cx,cyY,R+band/2,0,7); xctx.stroke();
      xctx.beginPath(); xctx.arc(cx,cyY,R-band/2,0,7); xctx.stroke();
      xctx.restore(); };
    edge(-1.2,-1.2,'rgba(255,255,255,0.22)',1.4);  // grace highlight
    edge(1.2,1.2,'rgba(0,0,0,0.55)',1.6);          // shadow

    // faint center boss (the Celtic knot heart, kept blank/subtle)
    const bg=xctx.createRadialGradient(cx-th*0.15,cyY-th*0.15,1, cx,cyY,th*0.55);
    bg.addColorStop(0,'#565656'); bg.addColorStop(1,'#1c1c1c');
    xctx.fillStyle=bg; xctx.beginPath(); xctx.arc(cx,cyY,th*0.42,0,7); xctx.fill();
  }

  // ---------- BLOOD ----------
  const rivs=[], falling=[];
  function spawn(routeKey){
    const r=routes[routeKey]; if(!r) return;
    rivs.push({ pts:r, i:0, prev:0,
      spd:(r.length/ (5200+Math.random()*2600)), // slow traversal
      w:2.6+Math.random()*3.4, life:1, fade:0.55+Math.random()*0.4,
      run:0, maxRun:0.55+Math.random()*0.5 }); // some disappear before the end
  }
  function paintSeg(x0,y0,x1,y1,w,a){
    bctx.lineCap='round';
    bctx.strokeStyle='rgba(120,0,0,'+(0.9*a)+')'; bctx.lineWidth=w;
    bctx.beginPath(); bctx.moveTo(x0,y0); bctx.lineTo(x1,y1); bctx.stroke();
    bctx.strokeStyle='rgba(205,0,0,'+(0.8*a)+')'; bctx.lineWidth=Math.max(1,w*0.55);
    bctx.beginPath(); bctx.moveTo(x0,y0); bctx.lineTo(x1,y1); bctx.stroke();
    bctx.strokeStyle='rgba(255,130,130,'+(0.3*a)+')'; bctx.lineWidth=Math.max(0.6,w*0.2);
    bctx.beginPath(); bctx.moveTo(x0-w*0.16,y0); bctx.lineTo(x1-w*0.16,y1); bctx.stroke();
  }
  function bead(g,x,y,r,a){ const grd=g.createRadialGradient(x-r*0.35,y-r*0.4,r*0.1,x,y,r);
    grd.addColorStop(0,'rgba(255,150,150,'+a+')'); grd.addColorStop(0.35,'rgba(224,0,0,'+a+')');
    grd.addColorStop(1,'rgba(122,0,0,'+a+')'); g.fillStyle=grd; g.beginPath(); g.arc(x,y,r,0,7); g.fill(); }

  // breathing spawn timer
  let t0=performance.now(), acc=0, last=performance.now();
  function frame(now){
    const dt=Math.min(50,now-last); last=now; const T=(now-t0)/1000;

    // fade the blood toward transparent -> it "disappears"
    bctx.globalCompositeOperation='destination-out';
    bctx.fillStyle='rgba(0,0,0,'+(reduce?0.010:0.014)+')'; bctx.fillRect(0,0,W,H);
    bctx.globalCompositeOperation='source-over';

    // breathing spawn rate (wells up, eases off, loops)
    const breath=0.5+0.5*Math.sin(T*0.55);          // 0..1 slow
    const rate=(0.6+breath*2.2)/1000;               // rivulets per ms
    acc+=dt*rate;
    while(acc>=1){ acc-=1;
      const rk = Math.random()<0.72 ? (Math.random()<0.5?'L':'R')
                                    : (Math.random()<0.5?'LA':'RA');
      spawn(rk);
    }

    // advance rivulets, paint trails to blood buffer
    for(let k=rivs.length-1;k>=0;k--){ const d=rivs[k];
      d.prev=d.i; d.i+=d.spd*dt; d.run+=d.spd*dt/d.pts.length;
      // gentle life falloff so some vanish partway (doesn't reach bottom)
      if(d.run>d.maxRun) d.life-=dt*0.0016;
      const a=Math.max(0, Math.min(1,d.life))*d.fade;
      const i1=Math.min(d.pts.length-1, d.i|0);
      const i0=Math.max(0, d.prev|0);
      for(let s=i0;s<i1;s++){ const p=d.pts[s],q=d.pts[s+1]; if(p&&q) paintSeg(p[0],p[1],q[0],q[1],d.w,a); }
      if(d.i>=d.pts.length-1){ // reached an end -> drip OFF
        const e=d.pts[d.pts.length-1];
        falling.push({x:e[0],y:e[1],v:0.3+Math.random()*0.5,w:d.w*0.9,a:a});
        rivs.splice(k,1);
      } else if(d.life<=0){ rivs.splice(k,1); } // disappeared partway
    }

    // update falling drips (off the cross, then fade)
    for(let k=falling.length-1;k>=0;k--){ const f=falling[k];
      f.v+=0.02; f.y+=f.v*(dt/16); f.a-=dt*0.0018;
      if(f.a<=0){ falling.splice(k,1); continue; }
      // short fading streak onto buffer
      paintSeg(f.x, f.y-Math.min(f.v*3,S*0.06), f.x, f.y, f.w*0.8, f.a*0.7);
    }

    // ---- COMPOSITE ----
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    ctx.drawImage(cross,0,0,W,H);      // the dimensional cross
    ctx.drawImage(blood,0,0,W,H);      // blood running in/out, fading
    // wet live heads on top
    for(const d of rivs){ const p=d.pts[Math.min(d.pts.length-1,d.i|0)];
      if(p){ const a=Math.max(0,Math.min(1,d.life))*d.fade; bead(ctx,p[0],p[1],d.w*0.8,a); } }
    for(const f of falling) bead(ctx,f.x,f.y,f.w*0.75,f.a);

    requestAnimationFrame(frame);
  }

  addEventListener('resize', build); build();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
