<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DARK SEVEN — the cross</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;touch-action:none;}
  #c{display:block;width:100vw;height:100vh;background:#000;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const cv=document.getElementById('c'), ctx=cv.getContext('2d',{alpha:false});
  const cross=document.createElement('canvas'), xctx=cross.getContext('2d'); // static cross art
  const blood=document.createElement('canvas'), bctx=blood.getContext('2d'); // fading blood
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const BONE='#e8e8e6', BONE_DIM='#9a9a97';

  let W,H,DPR,S,cx,cyY,pw,aT,aB,aL,aR,R1,R2,rm,ringMid;
  const routes={};

  function rr(g,x,y,w,h,r){ r=Math.min(r,w/2,h/2); g.beginPath();
    g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
    g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }
  function line(a,b,n){const p=[];for(let i=0;i<=n;i++){const t=i/n;p.push([a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t]);}return p;}
  function arc(ox,oy,r,a0,a1,n){const p=[];for(let i=0;i<=n;i++){const t=i/n,a=a0+(a1-a0)*t;p.push([ox+r*Math.cos(a),oy+r*Math.sin(a)]);}return p;}

  function build(){
    DPR=Math.min(devicePixelRatio||1,2); W=innerWidth; H=innerHeight;
    for(const c of [cv,cross,blood]){ c.width=Math.floor(W*DPR); c.height=Math.floor(H*DPR); }
    ctx.setTransform(DPR,0,0,DPR,0,0); xctx.setTransform(DPR,0,0,DPR,0,0); bctx.setTransform(DPR,0,0,DPR,0,0);
    S=Math.min(W,H); cx=W/2; cyY=H*0.42; pw=S*0.125;
    aT=cyY-S*0.30; aB=cyY+S*0.50; aL=cx-S*0.28; aR=cx+S*0.28;
    R2=S*0.245; R1=S*0.205; ringMid=(R1+R2)/2; rm=S*0.115;

    const top=line([cx,aT],[cx,cyY-R2],34);
    const lower=line([cx,cyY+R2],[cx,aB],46);
    const larc=arc(cx,cyY,ringMid,-Math.PI/2,-Math.PI/2-Math.PI,40);
    const rarc=arc(cx,cyY,ringMid,-Math.PI/2,-Math.PI/2+Math.PI,40);
    routes.L=top.concat(larc,lower); routes.R=top.concat(rarc,lower);
    routes.LA=line([cx,aT],[cx,cyY],20).concat(line([cx,cyY],[aL,cyY],26));
    routes.RA=line([cx,aT],[cx,cyY],20).concat(line([cx,cyY],[aR,cyY],26));

    drawCross(); bctx.clearRect(0,0,W,H);
  }

  // ---- Celtic knotwork lattice inside a panel ----
  function weave(g,x,y,w,h){
    const s=S*0.030, bw=s*0.46;
    g.save(); rr(g,x,y,w,h,Math.min(w,h)*0.18); g.clip();
    g.fillStyle='#000'; g.fillRect(x-2,y-2,w+4,h+4);
    g.lineCap='round';
    const fam=(dir)=>{ for(let o=-h;o<w+s;o+=s){
      const sx=x+o, sy=(dir>0)?y:y+h, ex=x+o+(w+h), ey=(dir>0)?y+(w+h):y+h-(w+h);
      g.strokeStyle='#000'; g.lineWidth=bw+3; g.beginPath(); g.moveTo(sx,sy); g.lineTo(ex,ey); g.stroke();
      g.strokeStyle=BONE; g.lineWidth=bw; g.beginPath(); g.moveTo(sx,sy); g.lineTo(ex,ey); g.stroke();
    }};
    fam(1); fam(-1); // second family reads as passing over -> woven look
    g.restore();
  }

  function bar(g,x,y,w,h){
    const bd=Math.min(w,h)*0.16, r=Math.min(w,h)*0.32;
    // soft 3D lift
    g.save(); g.shadowColor='rgba(0,0,0,0.85)'; g.shadowBlur=S*0.03; g.shadowOffsetX=S*0.008; g.shadowOffsetY=S*0.014;
    rr(g,x,y,w,h,r); g.fillStyle=BONE; g.fill(); g.restore();
    // punch inner black -> leaves outer bone border
    rr(g,x+bd,y+bd,w-2*bd,h-2*bd,r*0.7); g.fillStyle='#000'; g.fill();
    // thin inner bone frame (double-line border)
    g.lineWidth=Math.max(1.4,S*0.004); g.strokeStyle=BONE;
    rr(g,x+bd*1.7,y+bd*1.7,w-3.4*bd,h-3.4*bd,r*0.55); g.stroke();
    // knotwork inside
    weave(g,x+bd*2.1,y+bd*2.1,w-4.2*bd,h-4.2*bd);
    // grace highlight on top-left edge
    g.save(); g.translate(-1.2,-1.2); g.strokeStyle='rgba(255,255,255,0.28)'; g.lineWidth=1.4;
    rr(g,x,y,w,h,r); g.stroke(); g.restore();
  }

  function medallion(g){
    // circular knot at the crossing (covers where bars meet)
    g.save(); g.shadowColor='rgba(0,0,0,0.8)'; g.shadowBlur=S*0.02;
    g.beginPath(); g.arc(cx,cyY,rm,0,7); g.fillStyle=BONE; g.fill(); g.restore();
    g.beginPath(); g.arc(cx,cyY,rm*0.86,0,7); g.fillStyle='#000'; g.fill();
    g.lineWidth=Math.max(1.4,S*0.004); g.strokeStyle=BONE; g.beginPath(); g.arc(cx,cyY,rm*0.80,0,7); g.stroke();
    // 4-fold knot: four vesica petals + center ring
    g.lineWidth=Math.max(2,S*0.006); g.strokeStyle=BONE;
    for(let k=0;k<4;k++){ const a=k*Math.PI/2;
      g.save(); g.translate(cx,cyY); g.rotate(a);
      g.beginPath(); g.ellipse(0,-rm*0.42,rm*0.26,rm*0.5,0,0,7); g.stroke();
      g.restore();
    }
    g.beginPath(); g.arc(cx,cyY,rm*0.22,0,7); g.strokeStyle=BONE; g.stroke();
    g.beginPath(); g.arc(cx,cyY,rm*0.08,0,7); g.fillStyle=BONE; g.fill();
  }

  function ringBand(g){
    // double-ring nimbus behind the arms
    g.lineCap='butt';
    for(const rr2 of [R2,R1]){
      g.strokeStyle='#000'; g.lineWidth=S*0.028; g.beginPath(); g.arc(cx,cyY,rr2,0,7); g.stroke();
    }
    for(const rr2 of [R2,R1]){
      g.strokeStyle=BONE; g.lineWidth=S*0.020; g.beginPath(); g.arc(cx,cyY,rr2,0,7); g.stroke();
    }
    // subtle grace highlight top-left of ring
    g.strokeStyle='rgba(255,255,255,0.18)'; g.lineWidth=S*0.006;
    g.beginPath(); g.arc(cx,cyY,ringMid,-Math.PI*0.95,-Math.PI*0.25); g.stroke();
  }

  function drawCross(){
    xctx.clearRect(0,0,W,H);
    ringBand(xctx);                                   // nimbus behind
    bar(xctx, cx-pw/2, aT, pw, aB-aT);                // vertical shaft
    bar(xctx, aL, cyY-pw/2, aR-aL, pw);               // horizontal arms
    medallion(xctx);                                  // center knot on the crossing
  }

  // ---------- BLOOD (runs in/out, drips, disappears, drips off) ----------
  const rivs=[], falling=[];
  function spawn(rk){ const r=routes[rk]; if(!r) return;
    rivs.push({pts:r,i:0,prev:0,spd:(r.length/(5400+Math.random()*2800)),
      w:2.4+Math.random()*3.2,life:1,fade:0.55+Math.random()*0.4,run:0,maxRun:0.5+Math.random()*0.5}); }
  function seg(x0,y0,x1,y1,w,a){ bctx.lineCap='round';
    bctx.strokeStyle='rgba(120,0,0,'+(0.9*a)+')'; bctx.lineWidth=w; bctx.beginPath(); bctx.moveTo(x0,y0); bctx.lineTo(x1,y1); bctx.stroke();
    bctx.strokeStyle='rgba(205,0,0,'+(0.8*a)+')'; bctx.lineWidth=Math.max(1,w*0.55); bctx.beginPath(); bctx.moveTo(x0,y0); bctx.lineTo(x1,y1); bctx.stroke();
    bctx.strokeStyle='rgba(255,130,130,'+(0.28*a)+')'; bctx.lineWidth=Math.max(0.6,w*0.2); bctx.beginPath(); bctx.moveTo(x0-w*0.15,y0); bctx.lineTo(x1-w*0.15,y1); bctx.stroke(); }
  function bead(g,x,y,r,a){ const gr=g.createRadialGradient(x-r*0.35,y-r*0.4,r*0.1,x,y,r);
    gr.addColorStop(0,'rgba(255,150,150,'+a+')'); gr.addColorStop(0.35,'rgba(224,0,0,'+a+')'); gr.addColorStop(1,'rgba(122,0,0,'+a+')');
    g.fillStyle=gr; g.beginPath(); g.arc(x,y,r,0,7); g.fill(); }

  let t0=performance.now(), acc=0, last=performance.now();
  function frame(now){
    const dt=Math.min(50,now-last); last=now; const T=(now-t0)/1000;
    bctx.globalCompositeOperation='destination-out';
    bctx.fillStyle='rgba(0,0,0,'+(reduce?0.010:0.013)+')'; bctx.fillRect(0,0,W,H);
    bctx.globalCompositeOperation='source-over';

    const breath=0.5+0.5*Math.sin(T*0.5);
    acc+=dt*((0.5+breath*2.0)/1000);
    while(acc>=1){ acc-=1; const rk=Math.random()<0.72?(Math.random()<0.5?'L':'R'):(Math.random()<0.5?'LA':'RA'); spawn(rk); }

    for(let k=rivs.length-1;k>=0;k--){ const d=rivs[k];
      d.prev=d.i; d.i+=d.spd*dt; d.run+=d.spd*dt/d.pts.length;
      if(d.run>d.maxRun) d.life-=dt*0.0016;
      const a=Math.max(0,Math.min(1,d.life))*d.fade;
      const i1=Math.min(d.pts.length-1,d.i|0), i0=Math.max(0,d.prev|0);
      for(let s=i0;s<i1;s++){ const p=d.pts[s],q=d.pts[s+1]; if(p&&q) seg(p[0],p[1],q[0],q[1],d.w,a); }
      if(d.i>=d.pts.length-1){ const e=d.pts[d.pts.length-1]; falling.push({x:e[0],y:e[1],v:0.3+Math.random()*0.5,w:d.w*0.9,a}); rivs.splice(k,1); }
      else if(d.life<=0){ rivs.splice(k,1); }
    }
    for(let k=falling.length-1;k>=0;k--){ const f=falling[k]; f.v+=0.02; f.y+=f.v*(dt/16); f.a-=dt*0.0018;
      if(f.a<=0){ falling.splice(k,1); continue; } seg(f.x,f.y-Math.min(f.v*3,S*0.06),f.x,f.y,f.w*0.8,f.a*0.7); }

    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    ctx.drawImage(cross,0,0,W,H);
    ctx.drawImage(blood,0,0,W,H);
    for(const d of rivs){ const p=d.pts[Math.min(d.pts.length-1,d.i|0)]; if(p){ const a=Math.max(0,Math.min(1,d.life))*d.fade; bead(ctx,p[0],p[1],d.w*0.8,a); } }
    for(const f of falling) bead(ctx,f.x,f.y,f.w*0.75,f.a);
    requestAnimationFrame(frame);
  }

  addEventListener('resize', build); build(); requestAnimationFrame(frame);
})();
</script>
</body>
</html>
